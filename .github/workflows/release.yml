name: release

# Publishes a GitHub Release with the installable Navisworks 2024 bundle.
# Two ways to run it:
#
#   * commit a new tag name (e.g. v0.2.0) to dist/RELEASE_VERSION and push —
#     the release is created at that commit and the tag is created
#     server-side by gh, so no tag push or Actions UI access is needed.
#   * manual dispatch (Actions → release → Run workflow) with the version
#     input.
#
# A version that already has a release is skipped, so ordinary pushes that
# happen to touch dist/RELEASE_VERSION never fail the workflow.
#
# The bundle is BUILT FROM SOURCE on windows-latest (dotnet build -c Release):
# the DLLs come from the Dyncamelo.App plugin-layout build output, while
# dist/Dyncamelo.bundle supplies the template pieces (PackageContents.xml,
# en-US ribbon layout, icons) and dist/ supplies install-dyncamelo.bat and the
# bundle README. Committed DLLs under dist/ are never shipped.

on:
  push:
    branches: ['**']
    paths: ['dist/RELEASE_VERSION']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      CI: "true"
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = if ($env:INPUT_VERSION) { $env:INPUT_VERSION.Trim() } else { (Get-Content dist/RELEASE_VERSION -Raw).Trim() }
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Host "::error::'$version' is not a valid version tag (expected v<major>.<minor>.<patch>)"
            exit 1
          }
          gh release view $version --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $version already exists — nothing to do."
            Add-Content -Path $env:GITHUB_ENV -Value "SKIP=true"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"
          exit 0

      - name: Setup .NET SDK 8
        if: env.SKIP != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build solution (Release)
        if: env.SKIP != 'true'
        run: |
          dotnet restore Dyncamelo.sln
          if ($LASTEXITCODE -ne 0) { exit 1 }
          dotnet build Dyncamelo.sln -c Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Assemble bundle from build output
        if: env.SKIP != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          # The Dyncamelo.App build assembles the complete plugin file set here
          # (see the LayoutNavisworksPlugin target in Dyncamelo.App.csproj).
          $layout  = "src/Dyncamelo.App/bin/Release/net48/NavisworksPlugin/Dyncamelo.App"
          $staging = "staging"
          $year    = "$staging/Dyncamelo.bundle/2024"
          New-Item -ItemType Directory -Force -Path "$year/en-US", "$year/Resources", "$year/Samples" | Out-Null

          $dlls = @(
            'Dyncamelo.App.dll', 'Dyncamelo.Core.dll', 'Dyncamelo.Nodes.dll',
            'Dyncamelo.Navisworks.dll', 'Dyncamelo.UI.dll',
            'Nodify.dll', 'Newtonsoft.Json.dll'
          )
          foreach ($dll in $dlls) {
            $src = Join-Path $layout $dll
            if (-not (Test-Path $src)) {
              Write-Host "::error::Missing build output: $src"
              exit 1
            }
            Copy-Item $src -Destination $year
          }
          Copy-Item "$layout/en-US/Dyncamelo.xaml" -Destination "$year/en-US"
          Copy-Item "$layout/Resources/*.png"      -Destination "$year/Resources"

          # Example workflow graphs for the in-app Samples menu (staged into the
          # plugin layout by the LayoutNavisworksPlugin build target).
          $samples = Get-ChildItem "$layout/Samples/*.dyc"
          if ($samples.Count -lt 1) {
            Write-Host "::error::No sample graphs found in $layout/Samples"
            exit 1
          }
          Copy-Item "$layout/Samples/*.dyc" -Destination "$year/Samples"

          # Bundle manifest from the dist template, stamped with the release
          # version via XML DOM (a case-insensitive regex here once corrupted the
          # <?xml version=...?> declaration, making Navisworks silently ignore
          # the whole bundle — never string-edit this file).
          $numeric  = $env:VERSION.TrimStart('v')
          [xml]$doc = Get-Content "dist/Dyncamelo.bundle/PackageContents.xml" -Raw
          $doc.ApplicationPackage.Version = "$numeric.0"
          $manifestPath = Join-Path (Get-Location) "$staging/Dyncamelo.bundle/PackageContents.xml"
          $doc.Save($manifestPath)

          # Validation gate: the staged manifest MUST parse and carry the version.
          [xml]$check = Get-Content $manifestPath -Raw
          if ($check.ApplicationPackage.Version -ne "$numeric.0") {
            Write-Host "::error::Staged PackageContents.xml failed validation"
            exit 1
          }

          Copy-Item "dist/install-dyncamelo.bat" -Destination $staging
          Copy-Item "dist/README.md"             -Destination $staging
          Copy-Item "THIRD-PARTY-NOTICES.md"     -Destination $staging
          Copy-Item "LICENSE"                    -Destination $staging

      - name: Package bundle zip
        if: env.SKIP != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = "Dyncamelo-$env:VERSION-navisworks2024.zip"
          Compress-Archive -Path "staging/*" -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "$zip.sha256" -Value "$hash  $zip" -NoNewline
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP=$zip"

      - name: Create GitHub release
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $checksum = Get-Content "$env:ZIP.sha256" -Raw
          $notes = @"
          Dyncamelo for Autodesk Navisworks 2024 — visual programming (node graphs) inside Navisworks.

          ## Install

          1. Download and extract ``$env:ZIP``.
          2. Double-click ``install-dyncamelo.bat`` (copies the bundle to ``%APPDATA%\Autodesk\ApplicationPlugins`` — no admin rights needed).
          3. Start Navisworks Manage/Simulate 2024 — the **BIMCamel** ribbon tab appears with the Dyncamelo button.

          Uninstall: ``install-dyncamelo.bat uninstall``.

          **Troubleshooting** — if Navisworks reports ``PLUGIN_LOAD_02`` / ``0x80131515``, Windows kept the browser's "downloaded file" mark on the DLLs. Re-run ``install-dyncamelo.bat`` (it unblocks automatically since v0.1.1), or run: ``Get-ChildItem "`$env:APPDATA\Autodesk\ApplicationPlugins\Dyncamelo.bundle" -Recurse -File | Unblock-File`` in PowerShell.

          ## Checksum

          ``````
          $checksum
          ``````
          "@
          Set-Content -Path notes.md -Value $notes
          # Stable-named copy so releases/latest/download/<name> URLs never change.
          Copy-Item $env:ZIP "Dyncamelo-navisworks2024.zip"
          gh release create $env:VERSION $env:ZIP "$env:ZIP.sha256" "Dyncamelo-navisworks2024.zip" `
            --target $env:GITHUB_SHA `
            --title "Dyncamelo $env:VERSION (Navisworks 2024)" `
            --notes-file notes.md
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # Always expose the latest release zip as a workflow artifact (even when
      # the release already existed and packaging was skipped) so tooling can
      # relay it to the public dyncamelo-releases repo without extra tokens.
      - name: Expose latest release zip as artifact
        if: always() && env.VERSION != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path relay | Out-Null
          gh release download $env:VERSION --repo $env:GITHUB_REPOSITORY --dir relay --pattern "*.zip" --pattern "*.sha256"
          if ($LASTEXITCODE -ne 0) { Write-Host "No release to relay" }
          exit 0
      - uses: actions/upload-artifact@v4
        if: always() && env.VERSION != ''
        continue-on-error: true
        with:
          name: release-zip
          path: relay/
          retention-days: 7

      # Optional full automation: if a fine-grained PAT with contents:write on
      # mrshoma99-rgb/bimcamel is stored as the SITE_REPO_TOKEN secret, every
      # release updates the website's static download asset automatically
      # (bimcamel.com/downloads/Dyncamelo-navisworks2024.zip). Without the
      # secret this step is skipped and the site asset is updated manually
      # from the relay artifact.
      - name: Update website download asset (bimcamel repo)
        if: always() && env.VERSION != ''
        env:
          SITETOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          if (-not $env:SITETOKEN) { Write-Host "SITE_REPO_TOKEN not set - skipping site asset update (use the release-zip artifact to update manually)"; exit 0 }
          $versioned = Get-ChildItem relay -Filter "Dyncamelo-v*-navisworks2024.zip" | Select-Object -First 1
          if (-not $versioned) { Write-Host "::error::relay zip missing"; exit 1 }
          git clone --depth 1 "https://x-access-token:$($env:SITETOKEN)@github.com/mrshoma99-rgb/bimcamel.git" sitework
          $dl = "sitework/src/bimcamel-web/public/downloads"
          New-Item -ItemType Directory -Force -Path $dl | Out-Null
          Copy-Item $versioned.FullName "$dl/Dyncamelo-navisworks2024.zip" -Force
          $hash = (Get-FileHash "$dl/Dyncamelo-navisworks2024.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "$dl/Dyncamelo-navisworks2024.zip.sha256" -Value "$hash  Dyncamelo-navisworks2024.zip" -NoNewline
          Set-Content -Path "$dl/dyncamelo-latest.json" -Value ('{"version":"' + $env:VERSION + '","file":"Dyncamelo-navisworks2024.zip","sha256":"' + $hash + '"}') -NoNewline
          Push-Location sitework
          git config user.name "dyncamelo-release-bot"
          git config user.email "noreply@bimcamel.com"
          git add src/bimcamel-web/public/downloads
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "Site asset already current"; exit 0 }
          git commit -m "chore: Dyncamelo $env:VERSION download asset"
          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Pop-Location
