name: release

# Publishes a GitHub Release with the installable Navisworks 2024 bundle.
# Two ways to run it:
#
#   * push a version tag:        git tag v0.1.0 && git push origin v0.1.0
#   * manual dispatch (Actions → release → Run workflow) with the version
#     input — the release is created at the dispatched commit and the tag is
#     created server-side by gh, so no local tag push is needed.
#
# The zip is assembled from dist/ at the released commit — dist/Dyncamelo.bundle
# carries the compiled Release DLLs, ribbon layout, icons and manifest, and
# install-dyncamelo.bat installs it for the current user.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package bundle zip
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ZIP="Dyncamelo-${VERSION}-navisworks2024.zip"
          cd dist
          zip -r "../$ZIP" Dyncamelo.bundle install-dyncamelo.bat README.md \
              -x "Dyncamelo.bundle/2024/PLACE_DYNCAMELO_DLLS_HERE.txt"
          cd ..
          sha256sum "$ZIP" > "$ZIP.sha256"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Dyncamelo for Autodesk Navisworks 2024 — visual programming (node graphs) inside Navisworks."
            echo
            echo "## Install"
            echo
            echo "1. Download and extract \`$ZIP\`."
            echo "2. Double-click \`install-dyncamelo.bat\` (copies the bundle to \`%APPDATA%\\Autodesk\\ApplicationPlugins\` — no admin rights needed)."
            echo "3. Start Navisworks Manage/Simulate 2024 — the **BIMCamel** ribbon tab appears with the Dyncamelo button."
            echo
            echo "Uninstall: \`install-dyncamelo.bat uninstall\`."
            echo
            echo "## Checksum"
            echo
            echo '```'
            cat "$ZIP.sha256"
            echo '```'
          } > notes.md
          gh release create "$VERSION" "$ZIP" "$ZIP.sha256" \
            --target "$GITHUB_SHA" \
            --title "Dyncamelo $VERSION (Navisworks 2024)" \
            --notes-file notes.md
