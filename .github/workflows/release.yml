name: release

# Publishes a GitHub Release with the installable Navisworks 2024 bundle.
# Two ways to run it:
#
#   * commit a new tag name (e.g. v0.2.0) to dist/RELEASE_VERSION and push —
#     the release is created at that commit and the tag is created
#     server-side by gh, so no tag push or Actions UI access is needed.
#   * manual dispatch (Actions → release → Run workflow) with the version
#     input.
#
# A version that already has a release is skipped, so ordinary pushes that
# happen to touch dist/RELEASE_VERSION never fail the workflow.
#
# The bundle is BUILT FROM SOURCE on windows-latest (dotnet build -c Release):
# the DLLs come from the Dyncamelo.App plugin-layout build output, while
# dist/Dyncamelo.bundle supplies the template pieces (PackageContents.xml,
# en-US ribbon layout, icons) and dist/ supplies install-dyncamelo.bat and the
# bundle README. Committed DLLs under dist/ are never shipped.

on:
  push:
    branches: ['**']
    paths: ['dist/RELEASE_VERSION']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      CI: "true"
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = if ($env:INPUT_VERSION) { $env:INPUT_VERSION.Trim() } else { (Get-Content dist/RELEASE_VERSION -Raw).Trim() }
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Host "::error::'$version' is not a valid version tag (expected v<major>.<minor>.<patch>)"
            exit 1
          }
          gh release view $version --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $version already exists — nothing to do."
            Add-Content -Path $env:GITHUB_ENV -Value "SKIP=true"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"
          exit 0

      - name: Setup .NET SDK 8
        if: env.SKIP != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build & stage per-year bundle (2024/2025/2026)
        if: env.SKIP != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          # A Navisworks plug-in must be compiled against the API of the release it runs
          # in, so the App/Navisworks projects (and the vendored BIMCamel engine) build
          # once PER YEAR (NavisworksYear selects the Speckle.Navisworks.API version and
          # the per-year BIMCamel.dll). The year-agnostic DLLs (Core/Nodes/UI/Nodify/
          # Newtonsoft) are identical each build and ship in every year folder. Navisworks
          # loads the folder matching its own release via PackageContents.xml.
          $years   = '2024', '2025', '2026'
          $staging = "staging"
          $numeric = $env:VERSION.TrimStart('v')
          $dlls = @(
            'Dyncamelo.App.dll', 'Dyncamelo.Core.dll', 'Dyncamelo.Nodes.dll',
            'Dyncamelo.Navisworks.dll', 'Dyncamelo.UI.dll',
            'Nodify.dll', 'Newtonsoft.Json.dll',
            'BIMCamel.dll'
          )
          foreach ($year in $years) {
            Write-Host "=== Building for Navisworks $year ==="
            # Restore per year — the Speckle.Navisworks.API package version differs by year.
            dotnet restore Dyncamelo.sln -p:NavisworksYear=$year
            if ($LASTEXITCODE -ne 0) { exit 1 }
            dotnet build Dyncamelo.sln -c Release --no-restore -p:NavisworksYear=$year
            if ($LASTEXITCODE -ne 0) { exit 1 }

            $layout  = "src/Dyncamelo.App/bin/Release/net48/NavisworksPlugin/Dyncamelo.App"
            $yeardir = "$staging/Dyncamelo.bundle/$year"
            New-Item -ItemType Directory -Force -Path "$yeardir/en-US", "$yeardir/Resources", "$yeardir/Samples" | Out-Null
            foreach ($dll in $dlls) {
              $src = Join-Path $layout $dll
              if (-not (Test-Path $src)) {
                Write-Host "::error::Missing build output for ${year}: $src"
                exit 1
              }
              Copy-Item $src -Destination $yeardir
            }
            Copy-Item "$layout/en-US/Dyncamelo.xaml" -Destination "$yeardir/en-US"
            Copy-Item "$layout/Resources/*.png"      -Destination "$yeardir/Resources"
            $samples = Get-ChildItem "$layout/Samples/*.dyc"
            if ($samples.Count -lt 1) {
              Write-Host "::error::No sample graphs found in $layout/Samples"
              exit 1
            }
            Copy-Item "$layout/Samples/*.dyc" -Destination "$yeardir/Samples"
          }

          # Bundle manifest (multi-year Components) from the dist template, stamped with
          # the release version via XML DOM (a case-insensitive regex here once corrupted
          # the <?xml version=...?> declaration, making Navisworks silently ignore the
          # whole bundle — never string-edit this file).
          [xml]$doc = Get-Content "dist/Dyncamelo.bundle/PackageContents.xml" -Raw
          $doc.ApplicationPackage.Version = "$numeric.0"
          $manifestPath = Join-Path (Get-Location) "$staging/Dyncamelo.bundle/PackageContents.xml"
          $doc.Save($manifestPath)

          # Validation gate: the staged manifest MUST parse, carry the version, and list
          # all three year folders as ManagedPlugin components.
          [xml]$check = Get-Content $manifestPath -Raw
          if ($check.ApplicationPackage.Version -ne "$numeric.0") {
            Write-Host "::error::Staged PackageContents.xml failed validation"
            exit 1
          }
          foreach ($year in $years) {
            if (-not (Test-Path "$staging/Dyncamelo.bundle/$year/Dyncamelo.App.dll")) {
              Write-Host "::error::Year folder $year missing from staged bundle"
              exit 1
            }
          }

          Copy-Item "dist/install-dyncamelo.bat" -Destination $staging
          Copy-Item "dist/README.md"             -Destination $staging
          Copy-Item "THIRD-PARTY-NOTICES.md"     -Destination $staging
          Copy-Item "LICENSE"                    -Destination $staging

      - name: Build graphical installer (DyncameloSetup.exe)
        if: env.SKIP != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          # The staged bundle becomes the installer's embedded payload.
          $numeric = $env:VERSION.TrimStart('v')
          Compress-Archive -Path "staging/Dyncamelo.bundle" -DestinationPath "payload.zip"
          # --no-incremental is load-bearing: the earlier full-solution build
          # already compiled this project WITHOUT the payload, and MSBuild's
          # incremental check does not treat the added EmbeddedResource as a
          # change — an incremental build here shipped a payload-less exe once.
          dotnet build src/Dyncamelo.Installer/Dyncamelo.Installer.csproj -c Release `
            -p:BundlePayload="$(Join-Path (Get-Location) 'payload.zip')" `
            -p:Version=$numeric `
            --no-incremental `
            -o installer-out
          if ($LASTEXITCODE -ne 0) { exit 1 }
          if (-not (Test-Path "installer-out/DyncameloSetup.exe")) {
            Write-Host "::error::Installer build produced no DyncameloSetup.exe"
            exit 1
          }
          # Embedding gate: a resource is stored verbatim, so the exe MUST be
          # larger than the payload it carries. Anything smaller means the
          # payload is missing and the standalone download would be broken.
          $payloadSize = (Get-Item "payload.zip").Length
          $exeSize = (Get-Item "installer-out/DyncameloSetup.exe").Length
          if ($exeSize -le $payloadSize) {
            Write-Host "::error::DyncameloSetup.exe ($exeSize bytes) is smaller than its payload ($payloadSize bytes) - the bundle was not embedded"
            exit 1
          }
          Copy-Item "installer-out/DyncameloSetup.exe" "DyncameloSetup.exe"
          # The zip distribution gets the setup exe too: it installs the
          # sibling Dyncamelo.bundle folder when run without a payload.
          Copy-Item "installer-out/DyncameloSetup.exe" "staging/DyncameloSetup.exe"

      - name: Package bundle zip
        if: env.SKIP != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = "Dyncamelo-$env:VERSION-navisworks2024.zip"
          Compress-Archive -Path "staging/*" -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "$zip.sha256" -Value "$hash  $zip" -NoNewline
          $setupHash = (Get-FileHash "DyncameloSetup.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "DyncameloSetup.exe.sha256" -Value "$setupHash  DyncameloSetup.exe" -NoNewline
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP=$zip"

      - name: Create GitHub release
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $checksum = Get-Content "$env:ZIP.sha256" -Raw
          $setupChecksum = Get-Content "DyncameloSetup.exe.sha256" -Raw
          $notes = @"
          Dyncamelo for Autodesk Navisworks 2024, 2025 & 2026 — visual programming (node graphs) inside Navisworks.

          ## Install (recommended)

          1. Download ``DyncameloSetup.exe`` and run it — a graphical installer puts the bundle in ``%APPDATA%\Autodesk\ApplicationPlugins`` (per-user, no admin rights) and registers an Add/Remove Programs entry.
          2. If Windows SmartScreen appears (unsigned download), click **More info → Run anyway**.
          3. Start Navisworks Manage/Simulate 2024, 2025 or 2026 — the **BIMCamel** ribbon tab appears with the Dyncamelo button.

          Uninstall from Windows **Settings → Apps → Dyncamelo for Navisworks 2024**, or rerun the setup. Silent modes: ``DyncameloSetup.exe /silent`` and ``DyncameloSetup.exe /uninstall /silent``.

          ## Install (zip, scripted deployments)

          Download and extract ``$env:ZIP``, then run ``DyncameloSetup.exe`` (or ``install-dyncamelo.bat``) from the extracted folder.

          **Troubleshooting** — if Navisworks reports ``PLUGIN_LOAD_02`` / ``0x80131515`` after a *manual* copy of the extracted bundle, Windows kept the browser's "downloaded file" mark on the DLLs; the setup exe and the .bat both strip it automatically. Manual fix: ``Get-ChildItem "`$env:APPDATA\Autodesk\ApplicationPlugins\Dyncamelo.bundle" -Recurse -File | Unblock-File`` in PowerShell.

          ## Checksums

          ``````
          $checksum
          $setupChecksum
          ``````
          "@
          Set-Content -Path notes.md -Value $notes
          # Stable-named copy so releases/latest/download/<name> URLs never change.
          Copy-Item $env:ZIP "Dyncamelo-navisworks2024.zip"
          gh release create $env:VERSION $env:ZIP "$env:ZIP.sha256" "Dyncamelo-navisworks2024.zip" `
            "DyncameloSetup.exe" "DyncameloSetup.exe.sha256" `
            --target $env:GITHUB_SHA `
            --title "Dyncamelo $env:VERSION (Navisworks 2024)" `
            --notes-file notes.md
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # Always expose the latest release zip as a workflow artifact (even when
      # the release already existed and packaging was skipped) so tooling can
      # relay it to the public dyncamelo-releases repo without extra tokens.
      - name: Expose latest release zip as artifact
        if: always() && env.VERSION != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path relay | Out-Null
          gh release download $env:VERSION --repo $env:GITHUB_REPOSITORY --dir relay --pattern "*.zip" --pattern "*.sha256" --pattern "*.exe"
          if ($LASTEXITCODE -ne 0) { Write-Host "No release to relay" }
          exit 0
      - uses: actions/upload-artifact@v4
        if: always() && env.VERSION != ''
        continue-on-error: true
        with:
          name: release-zip
          path: relay/
          retention-days: 7

      # Optional full automation: if a fine-grained PAT with contents:write on
      # mrshoma99-rgb/bimcamel is stored as the SITE_REPO_TOKEN secret, every
      # release updates the website's static download asset automatically
      # (bimcamel.com/downloads/Dyncamelo-navisworks2024.zip). Without the
      # secret this step is skipped and the site asset is updated manually
      # from the relay artifact.
      - name: Update website download asset (bimcamel repo)
        if: always() && env.VERSION != ''
        env:
          SITETOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          if (-not $env:SITETOKEN) { Write-Host "SITE_REPO_TOKEN not set - skipping site asset update (use the release-zip artifact to update manually)"; exit 0 }
          $versioned = Get-ChildItem relay -Filter "Dyncamelo-v*-navisworks2024.zip" | Select-Object -First 1
          if (-not $versioned) { Write-Host "::error::relay zip missing"; exit 1 }
          git clone --depth 1 "https://x-access-token:$($env:SITETOKEN)@github.com/mrshoma99-rgb/bimcamel.git" sitework
          $dl = "sitework/src/bimcamel-web/public/downloads"
          New-Item -ItemType Directory -Force -Path $dl | Out-Null
          Copy-Item $versioned.FullName "$dl/Dyncamelo-navisworks2024.zip" -Force
          $hash = (Get-FileHash "$dl/Dyncamelo-navisworks2024.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "$dl/Dyncamelo-navisworks2024.zip.sha256" -Value "$hash  Dyncamelo-navisworks2024.zip" -NoNewline
          $setupHash = ""
          if (Test-Path "relay/DyncameloSetup.exe") {
            Copy-Item "relay/DyncameloSetup.exe" "$dl/DyncameloSetup.exe" -Force
            $setupHash = (Get-FileHash "$dl/DyncameloSetup.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
            Set-Content -Path "$dl/DyncameloSetup.exe.sha256" -Value "$setupHash  DyncameloSetup.exe" -NoNewline
          }
          Set-Content -Path "$dl/dyncamelo-latest.json" -Value ('{"version":"' + $env:VERSION + '","file":"Dyncamelo-navisworks2024.zip","sha256":"' + $hash + '","setup":"DyncameloSetup.exe","setupSha256":"' + $setupHash + '"}') -NoNewline
          # Keep the website's node-library catalog in lockstep with the release.
          python tools/generate_node_catalog.py --out "$dl/dyncamelo-nodes.json"
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::node catalog generation failed - site keeps its previous catalog"; git -C sitework checkout -- src/bimcamel-web/public/downloads/dyncamelo-nodes.json 2>$null }
          Push-Location sitework
          git config user.name "dyncamelo-release-bot"
          git config user.email "noreply@bimcamel.com"
          git add src/bimcamel-web/public/downloads
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "Site asset already current"; exit 0 }
          git commit -m "chore: Dyncamelo $env:VERSION download asset"
          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Pop-Location
